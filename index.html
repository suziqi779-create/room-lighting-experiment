<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>灯光调节实验</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

#container{
display:flex;
gap:40px;
align-items:center;
}

#canvas{
width:520px;
height:520px;
border:2px solid #333;
cursor:crosshair;
}

#ui-panel{
width:220px;
background:#222;
padding:20px;
border-radius:12px;
}

.label-grid{
display:grid;
grid-template-columns:1fr;
gap:18px;
}

.data-value{
font-size:18px;
font-weight:bold;
}

#finishBtn{
width:100%;
margin-top:20px;
padding:10px;
border-radius:10px;
border:none;
font-size:14px;
font-weight:600;
background:#00ffcc;
color:black;
cursor:pointer;
opacity:0.4;
}

#finishBtn.enabled{
opacity:1;
}

#finishBtn:disabled{
cursor:not-allowed;
}

.note{
margin-top:12px;
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<div id="container">

<canvas id="canvas" width="512" height="512"></canvas>

<div id="ui-panel">

<div class="label-grid">

<div>
色温 (X)  
<br>
<span id="val-x" class="data-value">--</span>
</div>

<div>
亮度 (Y)  
<br>
<span id="val-y" class="data-value">--</span>
</div>

</div>

<button id="finishBtn" disabled>完成实验</button>

<div class="note">
拖动图片选择你觉得最舒适的灯光
</div>

</div>

</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const valX = document.getElementById("val-x")
const valY = document.getElementById("val-y")

let cursorX = 0.5
let cursorY = 0.5

let currentBrightness = 50
let currentColorTemp = 4000

/* ---------- 图片路径 ---------- */

const imgPaths = {
warmLow:'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/3.png',
warmHigh:'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/2.png',
coolLow:'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/4.png',
coolHigh:'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/1.png'
}

const images = {}

/* ---------- 加载图片 ---------- */

function loadImages(){

const promises = Object.entries(imgPaths).map(([key,src])=>{
return new Promise(resolve=>{

const img = new Image()
img.crossOrigin="anonymous"
img.src = src

img.onload = ()=>{
images[key]=img
resolve()
}

})
})

return Promise.all(promises)

}

/* ---------- 渲染函数 ---------- */

function render(x,y){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.globalAlpha = (1-x)*(1-y)
ctx.drawImage(images.warmLow,0,0,canvas.width,canvas.height)

ctx.globalAlpha = (1-x)*y
ctx.drawImage(images.warmHigh,0,0,canvas.width,canvas.height)

ctx.globalAlpha = x*(1-y)
ctx.drawImage(images.coolLow,0,0,canvas.width,canvas.height)

ctx.globalAlpha = x*y
ctx.drawImage(images.coolHigh,0,0,canvas.width,canvas.height)

ctx.globalAlpha = 1

drawCursor(x,y)

updateUI(x,y)

}

/* ---------- 光标 ---------- */

function drawCursor(x,y){

ctx.beginPath()
ctx.arc(x*canvas.width,y*canvas.height,7,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

}

/* ---------- 更新数值 ---------- */

function updateUI(x,y){

const colorTemp = Math.round(2700 + x*3800)
const brightness = Math.round(y*100)

currentColorTemp = colorTemp
currentBrightness = brightness

valX.innerText = colorTemp+"K"
valY.innerText = brightness+"%"

}

/* ---------- 鼠标拖动 ---------- */

canvas.addEventListener("mousemove",(e)=>{

if(e.buttons!==1) return

const rect = canvas.getBoundingClientRect()

cursorX = (e.clientX-rect.left)/rect.width
cursorY = (e.clientY-rect.top)/rect.height

cursorX=Math.max(0,Math.min(1,cursorX))
cursorY=Math.max(0,Math.min(1,cursorY))

render(cursorX,cursorY)

})

/* ---------- 初始随机光照 ---------- */

function startExperiment(){

cursorX = Math.random()
cursorY = Math.random()

render(cursorX,cursorY)

}

/* ---------- 3秒提交锁 ---------- */

const finishBtn = document.getElementById("finishBtn")

setTimeout(()=>{
finishBtn.disabled=false
finishBtn.classList.add("enabled")
},3000)

/* ---------- 完成按钮 ---------- */

finishBtn.addEventListener("click",()=>{

const brightness = currentBrightness
const colorTemp = currentColorTemp

const credamoURL =
"https://www.credamo.com/survey/QUESTIONNAIRE_ID"+
"?brightness="+brightness+
"&colorTemp="+colorTemp

window.location.href = credamoURL

})

/* ---------- 初始化 ---------- */

loadImages().then(()=>{

startExperiment()

})

</script>

</body>
</html>
