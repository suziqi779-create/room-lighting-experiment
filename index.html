<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Room Lighting Experiment</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:#000;
}

/* 房间图片 */

#roomImage{

    position:fixed;
    left:0;
    top:0;

    width:100vw;
    height:100vh;

    object-fit:contain;

    transition:opacity 0.25s;
}


/* 控制面板 */

#controlPanel{

    position:fixed;
    right:40px;
    bottom:40px;

    padding:20px;
    border-radius:16px;

    background:rgba(0,0,0,0.35);
    backdrop-filter:blur(10px);

    z-index:20;
}


/* 调色矩阵 */

#matrix {

    width:240px;
    height:240px;

    background:
        linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%),
        linear-gradient(to right, #ff9e42 0%, #b1d2ff 100%);

    border:1px solid rgba(255,255,255,0.2);
    border-radius:12px;

    cursor:crosshair;
    position:relative;

    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);

    overflow:hidden;
}


/* 光标 */

#cursor{

    width:20px;
    height:20px;

    border:2px solid #fff;
    border-radius:50%;

    position:absolute;

    transform:translate(-50%,-50%);

    pointer-events:none;

    box-shadow:0 0 15px rgba(0,0,0,1);

    background:rgba(255,255,255,0.2);

    z-index:5;
}


/* 提交按钮 */

#submitBtn{

    margin-top:20px;
    width:240px;

    padding:10px;

    border:none;
    border-radius:10px;

    background:#ffffff;
    font-size:16px;

    cursor:pointer;
}

</style>
</head>

<body>


<img id="roomImage">


<div id="controlPanel">

    <div id="matrix">
        <div id="cursor"></div>
    </div>

    <button id="submitBtn">提交选择</button>

</div>



<script>

/* 图片路径 */

const imgPaths = {
    warmLow: '3.jpg',
    warmHigh: '2.jpg',
    coolLow: '4.jpg',
    coolHigh: '1.jpg'
};



/* 预加载图片 */

Object.values(imgPaths).forEach(src=>{
    const img = new Image();
    img.src = src;
});



const matrix = document.getElementById("matrix");
const cursor = document.getElementById("cursor");
const roomImage = document.getElementById("roomImage");

let x = Math.random();
let y = Math.random();

let startTime = Date.now();



/* 更新光标 */

function updateCursor(){

    cursor.style.left = (x*100)+"%";
    cursor.style.top = ((1-y)*100)+"%";

}



/* 更新房间灯光 */

function updateLighting(){

    if(x<0.5 && y<0.5){
        roomImage.src = imgPaths.warmLow;
    }

    if(x<0.5 && y>=0.5){
        roomImage.src = imgPaths.warmHigh;
    }

    if(x>=0.5 && y<0.5){
        roomImage.src = imgPaths.coolLow;
    }

    if(x>=0.5 && y>=0.5){
        roomImage.src = imgPaths.coolHigh;
    }

}



/* 点击调色盘 */

matrix.addEventListener("click",function(e){

    const rect = matrix.getBoundingClientRect();

    x = (e.clientX - rect.left) / rect.width;
    y = 1 - (e.clientY - rect.top) / rect.height;

    updateCursor();
    updateLighting();

});



/* 初始化 */

updateCursor();
updateLighting();




/* 提交按钮 */

document.getElementById("submitBtn").onclick = function(){


    let duration = Date.now() - startTime;

    if(duration < 1000){

        alert("请至少观察 1 秒后再提交");

        return;

    }


    /* 实验数据 */

    const result = {

        brightness:y,
        colorTemp:x,
        time:duration

    };


    console.log(result);



    /* Credamo 回传地址（发布问卷后填写） */

    const credamoURL = "https://www.credamo.com/survey/XXXX";



    const query =

        "?brightness="+result.brightness+
        "&colorTemp="+result.colorTemp+
        "&time="+result.time;



    window.location.href = credamoURL + query;

};



</script>


</body>
</html>
