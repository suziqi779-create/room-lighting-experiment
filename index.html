<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Room Lighting Experiment</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; background: #000; }
        #roomCanvas { position: fixed; left: 0; top: 0; width: 100vw; height: 100vh; object-fit: contain; }

        /* 控制面板 */
        #controlPanel {
            position: fixed; right: 40px; bottom: 40px;
            padding: 20px; border-radius: 16px;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(15px);
            z-index: 20; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        #matrix {
            width: 240px; height: 240px;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%),
                        linear-gradient(to right, #ff9e42 0%, #b1d2ff 100%);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px; cursor: crosshair; position: relative;
        }

        #cursor {
            width: 22px; height: 22px; border: 2px solid #fff; border-radius: 50%;
            position: absolute; transform: translate(-50%,-50%); pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.5); background: rgba(255,255,255,0.2);
        }

        #submitBtn {
            margin-top: 20px; width: 240px; padding: 12px; border: none;
            border-radius: 10px; background: #3F85FA; color: white; font-size: 16px;
            cursor: pointer; font-weight: bold; transition: all 0.3s;
        }
        #submitBtn:hover { background: #2b73e6; transform: translateY(-2px); }

        /* 成功提示遮罩 */
        #successToast {
            display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 255, 204, 0.9); color: #000; padding: 10px 20px;
            border-radius: 8px; font-weight: bold; z-index: 1000;
        }
    </style>
</head>
<body>

<canvas id="roomCanvas"></canvas>
<div id="successToast">The data has been updated. Please continue with the test.</div>

<div id="controlPanel">
    <div id="matrix"><div id="cursor"></div></div>
    <button id="submitBtn">Confirm selection</button>
</div>

<script>
const canvas = document.getElementById("roomCanvas");
const ctx = canvas.getContext("2d");
const matrix = document.getElementById("matrix");
const cursor = document.getElementById("cursor");
const submitBtn = document.getElementById("submitBtn");
const toast = document.getElementById("successToast");

// 1. 图片资源配置
const imgPaths = {
    warmLow: 'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/3.png',
    warmHigh: 'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/2.png',
    coolLow: 'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/4.png',
    coolHigh: 'https://cdn.jsdelivr.net/gh/suziqi779-create/room-lighting-experiment@main/1.png'
};

const images = {};
let loadedCount = 0;
let x = Math.random(), y = Math.random();

// 2. 预加载图片
Object.entries(imgPaths).forEach(([key, src]) => {
    const img = new Image();
    img.crossOrigin = "anonymous"; 
    img.src = src;
    img.onload = () => { 
        images[key] = img; 
        loadedCount++; 
        if (loadedCount === 4) render(); 
    };
});

// 3. 渲染插值画面
function render() {
    if (loadedCount < 4) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const w1 = (1 - x) * (1 - y), w2 = x * (1 - y), w3 = (1 - x) * y, w4 = x * y;
    ctx.globalCompositeOperation = 'lighter';

    const drawCover = (img, weight) => {
        if (weight <= 0 || !img) return;
        ctx.globalAlpha = weight;
        const imgRatio = img.width / img.height, canvasRatio = canvas.width / canvas.height;
        let dw, dh, dx, dy;
        if (canvasRatio > imgRatio) { dw = canvas.width; dh = canvas.width / imgRatio; dx = 0; dy = (canvas.height - dh) / 2; }
        else { dh = canvas.height; dw = canvas.height * imgRatio; dx = (canvas.width - dw) / 2; dy = 0; }
        ctx.drawImage(img, dx, dy, dw, dh);
    };

    drawCover(images.warmLow, w1); drawCover(images.coolLow, w2);
    drawCover(images.warmHigh, w3); drawCover(images.coolHigh, w4);
    cursor.style.left = (x * 100) + "%"; cursor.style.top = ((1 - y) * 100) + "%";
}

// 4. 交互处理
function handleUpdate(e) {
    const rect = matrix.getBoundingClientRect();
    x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    y = Math.max(0, Math.min(1, 1 - (e.clientY - rect.top) / rect.height));
    render();
}

matrix.addEventListener("mousedown", (e) => {
    handleUpdate(e);
    const move = (me) => handleUpdate(me);
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", () => window.removeEventListener("mousemove", move), { once: true });
});

// 5. 数据同步核心逻辑：发送给 Credamo 父页面 
submitBtn.onclick = function() {
    const brightnessVal = y.toFixed(3);
    const tempVal = x.toFixed(3);
    
    // 发送消息
    window.parent.postMessage({
        type: 'lighting_update',
        temp: tempVal,
        brightness: brightnessVal
    }, "*"); 

    // UI 反馈
    toast.style.display = "block";
    submitBtn.innerText = "已选择";
    submitBtn.style.background = "#aaa";
    submitBtn.disabled = true;
    
    setTimeout(() => { toast.style.display = "none"; }, 3000);
};

window.addEventListener("resize", render);
</script>
</body>
</html>
