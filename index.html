<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>灯光调节实验</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#000;
}

/* 房间图片层 */

#room{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
overflow:hidden;
}

.room-img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 0.2s linear;
}

/* 调色盘 */

#palette{
position:fixed;
right:40px;
bottom:40px;
width:220px;
height:220px;
border:2px solid white;
cursor:crosshair;
}

/* 信息面板 */

#panel{
position:fixed;
right:40px;
bottom:280px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
color:white;
font-size:14px;
}

#finishBtn{
margin-top:10px;
width:100%;
padding:8px;
border:none;
border-radius:6px;
background:#00ffcc;
font-weight:bold;
cursor:pointer;
opacity:0.4;
}

#finishBtn.enabled{
opacity:1;
}

</style>
</head>

<body>

<div id="room">

<img id="warmLow" class="room-img"
src="https://raw.githubusercontent.com/suziqi779-create/room-lighting-experiment/main/3.png">

<img id="warmHigh" class="room-img"
src="https://raw.githubusercontent.com/suziqi779-create/room-lighting-experiment/main/2.png">

<img id="coolLow" class="room-img"
src="https://raw.githubusercontent.com/suziqi779-create/room-lighting-experiment/main/4.png">

<img id="coolHigh" class="room-img"
src="https://raw.githubusercontent.com/suziqi779-create/room-lighting-experiment/main/1.png">

</div>

<canvas id="palette" width="220" height="220"></canvas>

<div id="panel">

<div>色温: <span id="temp">--</span></div>
<div>亮度: <span id="bright">--</span></div>

<button id="finishBtn" disabled>完成实验</button>

</div>

<script>

const palette=document.getElementById("palette")
const ctx=palette.getContext("2d")

const tempText=document.getElementById("temp")
const brightText=document.getElementById("bright")

const warmLow=document.getElementById("warmLow")
const warmHigh=document.getElementById("warmHigh")
const coolLow=document.getElementById("coolLow")
const coolHigh=document.getElementById("coolHigh")

let cursorX=Math.random()
let cursorY=Math.random()

let brightness=50
let colorTemp=4000

/* 绘制调色盘 */

function drawPalette(){

for(let x=0;x<palette.width;x++){

let grad=ctx.createLinearGradient(0,0,0,palette.height)

let t=2700+(x/palette.width)*3800

grad.addColorStop(0,"rgb(255,200,150)")
grad.addColorStop(1,"rgb(50,50,80)")

ctx.fillStyle=grad
ctx.fillRect(x,0,1,palette.height)

}

drawCursor()

}

function drawCursor(){

ctx.beginPath()
ctx.arc(cursorX*palette.width,cursorY*palette.height,6,0,Math.PI*2)
ctx.fillStyle="white"
ctx.fill()

}

/* 更新灯光 */

function updateLighting(){

let x=cursorX
let y=cursorY

warmLow.style.opacity=(1-x)*(1-y)
warmHigh.style.opacity=(1-x)*y
coolLow.style.opacity=x*(1-y)
coolHigh.style.opacity=x*y

colorTemp=Math.round(2700+x*3800)
brightness=Math.round(y*100)

tempText.innerText=colorTemp+"K"
brightText.innerText=brightness+"%"

}

/* 鼠标控制 */

palette.addEventListener("mousemove",e=>{

if(e.buttons!==1)return

let rect=palette.getBoundingClientRect()

cursorX=(e.clientX-rect.left)/rect.width
cursorY=(e.clientY-rect.top)/rect.height

cursorX=Math.max(0,Math.min(1,cursorX))
cursorY=Math.max(0,Math.min(1,cursorY))

ctx.clearRect(0,0,palette.width,palette.height)
drawPalette()

updateLighting()

})

/* 初始化 */

drawPalette()
updateLighting()

/* 3秒提交锁 */

const finishBtn=document.getElementById("finishBtn")

setTimeout(()=>{
finishBtn.disabled=false
finishBtn.classList.add("enabled")
},3000)

/* Credamo回传 */

finishBtn.onclick=()=>{

let url=
"https://www.credamo.com/survey/QUESTIONNAIRE_ID"+
"?brightness="+brightness+
"&colorTemp="+colorTemp

window.location.href=url

}

</script>

</body>
</html>
